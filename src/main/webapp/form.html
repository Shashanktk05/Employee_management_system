
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insert Employee</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, Helvetica, sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #4facfe, #00f2fe);
	overflow: hidden;
}

.container {
	width: 550px;
	background: #fff;
	padding: 20px;
	border-radius: 12px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
}

h2 {
	text-align: center;
	color: #2c3e50;
	margin-bottom: 15px;
}

form {
	display: flex;
	flex-direction: column;
	gap: 10px;
}

.row {
	display: flex;
	gap: 12px;
}

.input-group {
	flex: 1;
	display: flex;
	flex-direction: column;
}

label {
	font-size: 14px;
	font-weight: bold;
	margin-bottom: 4px;
	color: #333;
}

input, textarea, select {
	width: 100%;
	padding: 8px;
	border: 1px solid #ccc;
	border-radius: 6px;
	font-size: 14px;
	outline: none;
}

input:focus, textarea:focus, select:focus {
	border-color: #3498db;
}

textarea {
	resize: none;
	height: 55px;
}

.button-group {
	display: flex;
	gap: 12px;
	margin-top: 10px;
}

.button-group button {
	flex: 1;
	padding: 10px;
	border: none;
	border-radius: 6px;
	color: white;
	font-size: 16px;
	font-weight: bold;
	cursor: pointer;
	transition: .3s;
}

.insert-btn {
	background: #27ae60;
}

.insert-btn:hover {
	background: #1e8449;
}

.back-btn {
	background: #e74c3c;
}

.back-btn:hover {
	background: #c0392b;
}
</style>

</head>
<body>

	<div class="container">

		<h2>Insert Employee Details</h2>

		<form action="insert" method="post">

			<div class="row">
				<div class="input-group">
					<label>Employee ID</label> <input type="number" name="id" required>
				</div>

				<div class="input-group">
					<label>Age</label> <input type="number" name="age" required>
				</div>
			</div>

			<div class="input-group">
				<label>Employee Name</label> <input type="text" name="name" required>
			</div>

			<div class="row">
				<div class="input-group">
					<label>Email</label> <input type="email" name="email" required>
				</div>

				<div class="input-group">
					<label>Phone Number</label> <input type="text" name="phno" required>
				</div>
			</div>

			<div class="input-group">
				<label>Address</label>
				<textarea name="address" required></textarea>
			</div>

			<div class="row">
				<div class="input-group">
					<label>Salary</label> <input type="number" step="0.01"
						name="salary" required>
				</div>

				<div class="input-group">
					<label>Employee Status</label> <select name="isActive" required>
						<option value="true">Active</option>
						<option value="false">Inactive</option>
					</select>
				</div>
			</div>

			<div class="button-group">
				<button type="button" class="back-btn"
					onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="insert-btn"
					onclick="location.href='insert'">Insert Employee</button>


			</div>

		</form>

	</div>

</body>
</html>
