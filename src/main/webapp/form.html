<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insert Employee</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

	<div class="notion-card">
		<div class="page-icon">📝</div>
		<h2 style="text-align: center; margin-bottom: var(--spacing-4);">Insert Employee Details</h2>
		<p class="editorial-intro" style="text-align: center; margin-bottom: var(--spacing-24);">
			Add a new record to the employee directory database. All fields are required.
		</p>

		<form action="insert" method="post">

			<div class="form-row">
				<div class="form-group">
					<label>Employee ID</label> 
					<input type="number" name="id" placeholder="e.g. 1001" required>
				</div>

				<div class="form-group">
					<label>Age</label> 
					<input type="number" name="age" placeholder="e.g. 28" required>
				</div>
			</div>

			<div class="form-group">
				<label>Employee Name</label> 
				<input type="text" name="name" placeholder="First and Last Name" required>
			</div>

			<div class="form-row">
				<div class="form-group">
					<label>Email</label> 
					<input type="email" name="email" placeholder="name@company.com" required>
				</div>

				<div class="form-group">
					<label>Phone Number</label> 
					<input type="text" name="phno" placeholder="e.g. +1234567890" required>
				</div>
			</div>

			<div class="form-group">
				<label>Address</label>
				<textarea name="address" placeholder="Street Address, City, ZIP" required></textarea>
			</div>

			<div class="form-row">
				<div class="form-group">
					<label>Salary</label> 
					<input type="number" step="0.01" name="salary" placeholder="e.g. 75000.00" required>
				</div>

				<div class="form-group">
					<label>Employee Status</label> 
					<select name="isActive" required>
						<option value="true">Active</option>
						<option value="false">Inactive</option>
					</select>
				</div>
			</div>

			<div class="button-group">
				<button type="button" class="btn-outline"
					onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="btn-primary"
					onclick="location.href='insert'">Insert Employee</button>
			</div>

		</form>

	</div>

</body>
</html>
