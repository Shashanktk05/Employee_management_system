<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Employee</title>
<link rel="stylesheet" href="css/style.css">

<script>
	function showInput(type, btn) {
		document.getElementById("updateForm").style.display = "block";
		document.getElementById("updateType").value = type;

		// Manage button active states
		let buttons = document.querySelectorAll(".options-grid .option-btn");
		buttons.forEach(function(b) {
			b.classList.remove("selected");
		});
		if (btn) {
			btn.classList.add("selected");
		}

		let label = document.getElementById("valueLabel");
		let input = document.getElementById("value");

		input.value = "";

		switch (type) {
		case "name":
			label.innerHTML = "Enter New Name";
			input.type = "text";
			input.placeholder = "e.g. John Doe";
			break;
		case "age":
			label.innerHTML = "Enter New Age";
			input.type = "number";
			input.placeholder = "e.g. 30";
			break;
		case "email":
			label.innerHTML = "Enter New Email";
			input.type = "email";
			input.placeholder = "e.g. john@company.com";
			break;
		case "phone":
			label.innerHTML = "Enter New Phone Number";
			input.type = "text";
			input.placeholder = "e.g. +1234567890";
			break;
		case "address":
			label.innerHTML = "Enter New Address";
			input.type = "text";
			input.placeholder = "e.g. 123 Main St, New York";
			break;
		case "salary":
			label.innerHTML = "Enter New Salary";
			input.type = "number";
			input.placeholder = "e.g. 75000.00";
			break;
		case "isActive":
			label.innerHTML = "Enter Status (true / false)";
			input.type = "text";
			input.placeholder = "true or false";
			break;
		}
	}
</script>
</head>
<body>

	<div class="notion-card">
		<div class="page-icon">✏️</div>
		<h2 style="text-align: center; margin-bottom: var(--spacing-4);">Update Employee Details</h2>
		<p class="editorial-intro" style="text-align: center; margin-bottom: var(--spacing-24);">
			Select the field you wish to update and specify the new value.
		</p>

		<form action="update" method="post">

			<div class="form-group" style="margin-bottom: var(--spacing-24);">
				<label>Employee ID</label> 
				<input type="number" name="id" placeholder="Enter employee ID to update" required>
			</div>

			<div class="form-group">
				<label>Select Field to Update</label>
				<div class="options-grid">
					<button type="button" class="option-btn" onclick="showInput('name', this)">Name</button>
					<button type="button" class="option-btn" onclick="showInput('age', this)">Age</button>
					<button type="button" class="option-btn" onclick="showInput('email', this)">Email</button>
					<button type="button" class="option-btn" onclick="showInput('phone', this)">Phone</button>
					<button type="button" class="option-btn" onclick="showInput('address', this)">Address</button>
					<button type="button" class="option-btn" onclick="showInput('salary', this)">Salary</button>
					<button type="button" class="option-btn" onclick="showInput('isActive', this)">Status</button>
				</div>
			</div>

			<div id="updateForm" style="display: none; margin-bottom: var(--spacing-24); border-top: 1px solid var(--color-border); padding-top: var(--spacing-20);">
				<input type="hidden" name="updateType" id="updateType"> 
				<div class="form-group">
					<label id="valueLabel"></label> 
					<input type="text" name="value" id="value" required>
				</div>
			</div>

			<div class="button-group">
				<button type="button" class="btn-outline" onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="btn-primary">Update Employee</button>
			</div>

		</form>

	</div>

</body>
</html>
