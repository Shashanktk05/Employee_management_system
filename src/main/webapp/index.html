<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

	<div class="notion-card">
		<div class="page-icon">💼</div>
		<h1 style="text-align: center;">Employee Directory</h1>
		<p class="editorial-intro" style="text-align: center; max-width: 420px; margin: 0 auto var(--spacing-24) auto;">
			A warm, minimal workspace to register, inspect, and update employee credentials.
		</p>
		
		<div style="display: flex; flex-direction: column; gap: var(--spacing-12); margin-top: var(--spacing-24);">
			<button class="btn-primary" onclick="location.href='form.html'">
				<span style="margin-right: var(--spacing-8);">➕</span> Insert Employee Details
			</button>

			<button class="btn-outline" onclick="location.href='update.html'">
				<span style="margin-right: var(--spacing-8);">✏️</span> Update Employee Data
			</button>

			<button class="btn-ghost-cta" onclick="location.href='select.html'">
				<span style="margin-right: var(--spacing-8);">🔍</span> Search & View Database
			</button>

			<button class="btn-danger" onclick="location.href='delete.html'">
				<span style="margin-right: var(--spacing-8);">🗑️</span> Delete Employee Data
			</button>
		</div>
	</div>

</body>
</html>
