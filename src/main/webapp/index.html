
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, Helvetica, sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container {
	width: 420px;
	background: white;
	padding: 40px;
	border-radius: 15px;
	text-align: center;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

h1 {
	color: #2c3e50;
	margin-bottom: 10px;
	font-size: 28px;
}

hr {
	border: none;
	height: 2px;
	background: #4facfe;
	margin: 20px auto 30px;
	width: 80%;
}

.btn {
	display: block;
	width: 100%;
	padding: 14px;
	margin: 15px 0;
	border: none;
	border-radius: 8px;
	background: #3498db;
	color: white;
	font-size: 17px;
	font-weight: bold;
	cursor: pointer;
	transition: 0.3s;
}

.btn:hover {
	background: #2980b9;
	transform: scale(1.03);
}

.insert {
	background: #27ae60;
}

.insert:hover {
	background: #1e8449;
}

.update {
	background: #f39c12;
}

.update:hover {
	background: #d68910;
}

.delete {
	background: #e74c3c;
}

.delete:hover {
	background: #c0392b;
}

.select {
	background: #8e44ad;
}

.select:hover {
	background: #6c3483;
}
</style>

</head>

<body>

	<div class="container">

		<h1>Welcome to Employee Management System</h1>

		<hr>

		<button class="btn insert" onclick="location.href='form.html'">Insert
			Employee Details</button>

		<button class="btn update" onclick="location.href='update.html'">Update Employee Data</button>

		<button class="btn delete" onclick="location.href='delete.html'" >Delete Employee Data</button>

		<button class="btn select" onclick="location.href='select.html'">Select Data from Database</button>

	</div>

</body>
</html>
