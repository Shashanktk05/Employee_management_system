
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Employee</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, Helvetica, sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #ff9966, #ff5e62);
}

.container {
	width: 500px;
	background: #fff;
	padding: 30px;
	border-radius: 12px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
	text-align: center;
}

h2 {
	color: #c0392b;
	margin-bottom: 20px;
}

.button-group {
	display: flex;
	gap: 10px;
	margin-bottom: 25px;
}

.option-btn {
	flex: 1;
	padding: 10px;
	border: none;
	border-radius: 6px;
	background: #3498db;
	color: white;
	font-size: 15px;
	font-weight: bold;
	cursor: pointer;
	transition: .3s;
}

.option-btn:hover {
	background: #2980b9;
}

#deleteForm {
	display: none;
}

label {
	display: block;
	text-align: left;
	margin-bottom: 6px;
	font-weight: bold;
	color: #333;
}

input {
	width: 100%;
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 6px;
	font-size: 15px;
	margin-bottom: 20px;
	outline: none;
}

input:focus {
	border-color: #3498db;
}

.action-buttons {
	display: flex;
	gap: 10px;
}

.delete-btn, .back-btn {
	flex: 1;
	padding: 10px;
	border: none;
	border-radius: 6px;
	color: white;
	font-size: 16px;
	font-weight: bold;
	cursor: pointer;
	transition: .3s;
}

.delete-btn {
	background: #e74c3c;
}

.delete-btn:hover {
	background: #c0392b;
}

.back-btn {
	background: #2ecc71;
}

.back-btn:hover {
	background: #27ae60;
}
</style>

<script>
	function showInput(type) {

		document.getElementById("deleteForm").style.display = "block";

		let label = document.getElementById("inputLabel");
		let input = document.getElementById("inputValue");
		let hidden = document.getElementById("deleteType");

		hidden.value = type;
		input.value = "";

		if (type == "id") {
			label.innerHTML = "Enter Employee ID";
			input.type = "number";
			input.placeholder = "Enter Employee ID";
		} else if (type == "email") {
			label.innerHTML = "Enter Employee Email";
			input.type = "email";
			input.placeholder = "Enter Employee Email";
		} else {
			label.innerHTML = "Enter Employee Phone Number";
			input.type = "text";
			input.placeholder = "Enter Employee Phone Number";
		}

	}
</script>

</head>

<body>

	<div class="container">

		<h2>Delete Employee</h2>

		<div class="button-group">

			<button type="button" class="option-btn" onclick="showInput('id')">
				Delete By ID</button>

			<button type="button" class="option-btn" onclick="showInput('email')">
				Delete By Email</button>

			<button type="button" class="option-btn" onclick="showInput('phone')">
				Delete By Phone</button>

		</div>

		<form id="deleteForm" action="delete" method="post">

			<input type="hidden" id="deleteType" name="deleteType"> <label
				id="inputLabel"></label> <input type="text" id="inputValue"
				name="value" required>

			<div class="action-buttons">


				<button type="button" class="back-btn"
					onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="delete-btn">Delete Employee</button>

			</div>

		</form>

	</div>

</body>
</html>
