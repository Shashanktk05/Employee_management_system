<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Employee</title>
<link rel="stylesheet" href="css/style.css">

<script>
	function showInput(type, btn) {
		document.getElementById("deleteForm").style.display = "block";

		let label = document.getElementById("inputLabel");
		let input = document.getElementById("inputValue");
		let hidden = document.getElementById("deleteType");

		hidden.value = type;
		input.value = "";

		// Manage button active states
		let buttons = document.querySelectorAll(".options-grid .option-btn");
		buttons.forEach(function(b) {
			b.classList.remove("selected");
		});
		if (btn) {
			btn.classList.add("selected");
		}

		if (type == "id") {
			label.innerHTML = "Enter Employee ID";
			input.type = "number";
			input.placeholder = "e.g. 1001";
		} else if (type == "email") {
			label.innerHTML = "Enter Employee Email";
			input.type = "email";
			input.placeholder = "e.g. john@company.com";
		} else {
			label.innerHTML = "Enter Employee Phone Number";
			input.type = "text";
			input.placeholder = "e.g. +1234567890";
		}
	}
</script>
</head>
<body>

	<div class="notion-card">
		<div class="page-icon">🗑️</div>
		<h2 style="text-align: center; margin-bottom: var(--spacing-4);">Delete Employee</h2>
		<p class="editorial-intro" style="text-align: center; margin-bottom: var(--spacing-24);">
			Select the deletion criterion and enter the corresponding value to delete the record.
		</p>

		<div class="form-group">
			<label>Delete Criterion</label>
			<div class="options-grid">
				<button type="button" class="option-btn" onclick="showInput('id', this)">Delete By ID</button>
				<button type="button" class="option-btn" onclick="showInput('email', this)">Delete By Email</button>
				<button type="button" class="option-btn" onclick="showInput('phone', this)">Delete By Phone</button>
			</div>
		</div>

		<form id="deleteForm" action="delete" method="post" style="display: none; border-top: 1px solid var(--color-border); padding-top: var(--spacing-20); margin-top: var(--spacing-8);">

			<input type="hidden" id="deleteType" name="deleteType"> 
			
			<div class="form-group" style="margin-bottom: var(--spacing-24);">
				<label id="inputLabel"></label> 
				<input type="text" id="inputValue" name="value" required>
			</div>

			<div class="button-group">
				<button type="button" class="btn-outline" onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="btn-danger">Delete Employee</button>
			</div>

		</form>

	</div>

</body>
</html>
