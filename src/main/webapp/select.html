<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Employee</title>
<link rel="stylesheet" href="css/style.css">

<script>
	function removeSelection(group) {
		let buttons = document.querySelectorAll(group);
		buttons.forEach(function(btn) {
			btn.classList.remove("selected");
		});
	}

	function showId(button) {
		removeSelection(".main-buttons button");
		button.classList.add("selected");
		document.getElementById("idSection").style.display = "block";
		document.getElementById("sortSection").style.display = "none";
	}

	function showSort(button) {
		removeSelection(".main-buttons button");
		button.classList.add("selected");
		document.getElementById("sortSection").style.display = "block";
		document.getElementById("idSection").style.display = "none";
	}

	function setSort(type, button) {
		document.getElementById("sortType").value = type;
		removeSelection(".sort-grid button");
		button.classList.add("selected");
	}
</script>
</head>
<body>

	<div class="notion-card">
		<div class="page-icon">🔍</div>
		<h2 style="text-align: center; margin-bottom: var(--spacing-4);">Select Employee Details</h2>
		<p class="editorial-intro" style="text-align: center; margin-bottom: var(--spacing-24);">
			Retrieve a specific employee by ID or display sorted listings of all records.
		</p>

		<div class="main-buttons" style="display: flex; gap: var(--spacing-12); margin-bottom: var(--spacing-24);">
			<button type="button" class="option-btn" style="flex: 1; padding: 12px;" onclick="showId(this)">Select By ID</button>
			<button type="button" class="option-btn" style="flex: 1; padding: 12px;" onclick="showSort(this)">Display All Employees</button>
		</div>

		<form action="select" method="post">

			<div id="idSection" style="display: none; margin-bottom: var(--spacing-24);">
				<div class="form-group">
					<label>Enter Employee ID</label> 
					<input type="number" name="id" placeholder="e.g. 1001">
				</div>
			</div>

			<div id="sortSection" style="display: none; margin-bottom: var(--spacing-24); border-top: 1px solid var(--color-border); padding-top: var(--spacing-20);">
				<h3 style="margin-bottom: var(--spacing-16); text-align: center; font-size: 11px; color: var(--color-slate); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;">Select Sorting Option</h3>

				<input type="hidden" name="sortType" id="sortType">

				<div class="sort-grid options-grid" style="grid-template-columns: repeat(2, 1fr);">
					<button type="button" class="option-btn" onclick="setSort('idAsc',this)">ID ↑ (Ascending)</button>
					<button type="button" class="option-btn" onclick="setSort('idDesc',this)">ID ↓ (Descending)</button>
					<button type="button" class="option-btn" onclick="setSort('nameAsc',this)">Name A-Z</button>
					<button type="button" class="option-btn" onclick="setSort('nameDesc',this)">Name Z-A</button>
					<button type="button" class="option-btn" onclick="setSort('salaryAsc',this)">Salary Low-High</button>
					<button type="button" class="option-btn" onclick="setSort('salaryDesc',this)">Salary High-Low</button>
					<button type="button" class="option-btn" onclick="setSort('active',this)">🟢 Active Employees</button>
					<button type="button" class="option-btn" onclick="setSort('inactive',this)">🔴 Inactive Employees</button>
				</div>
			</div>

			<div class="button-group">
				<button type="button" class="btn-outline" onclick="location.href='index.html'">Go Back</button>
				<button type="submit" class="btn-primary">Search</button>
			</div>

		</form>

	</div>

</body>
</html>
